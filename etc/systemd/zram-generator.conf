[zram0]
# Size of ZRAM swap device
# Recommendation: 25-50% of system RAM (compressed can hold much more data)
# min(ram / 2, 4096) means: half of RAM, capped at 4GB
# Unit is MiB — do not add M/G suffix (zram-generator default syntax)
zram-size = min(ram / 2, 4096)

# Compression algorithm
# zstd = best compression ratio, moderate speed (RECOMMENDED)
# lz4 = low compression, very fast (good for fast systems)
# lzo = legacy, avoid
#
# Benchmark: zstd typically achieves 2.5x-3x compression
# Memory saved: 8GB RAM -> ~6GB available + 2GB compressed ZRAM
compression-algorithm = zstd

# Memory limit before using swap (in bytes)
# Default: unlimited (kernel decides)
# Optional: memory-limit = 1G  (don't reserve more than 1GB for zram)

# I/O priority for this swap device
# Valid: 0-32767 (higher = more preferred)
# Convention: -32768 = lowest (disk swap), 100 = high (ZRAM preferred)
# Recommendation: 100 for fast in-memory swap
swap-priority = 100
